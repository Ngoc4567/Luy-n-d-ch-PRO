<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Cấu hình để chạy như App trên iPad -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Luyện Dịch Tiếng Anh AI</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .box { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #007bff; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        #result { display: none; margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 Luyện Dịch PRO</h2>
    <div class="box">
        <strong>Câu tiếng Việt:</strong><br>
        <span id="vi-sentence">Tôi thích học lập trình vì nó giúp tôi sáng tạo hơn.</span>
    </div>
    
    <textarea id="en-input" placeholder="Dịch sang tiếng Anh..."></textarea>
    <button onclick="checkResult()">Chấm điểm với AI</button>

    <div id="result">
        <h3 id="score" style="text-align: center; color: #28a745;">0/100</h3>
        <p><strong>Đáp án đúng:</strong> <i id="correct-ans"></i></p>
        <p><strong>Nhận xét:</strong> <span id="feedback"></span></p>
        <button onclick="location.reload()" style="background: #6c757d;">Câu tiếp theo</button>
    </div>
</div>

<script>
    const API_KEY = "DÁN_MÃ_API_CỦA_BẠN_VÀO_ĐÂY";

    async function checkResult() {
        const userInput = document.getElementById('en-input').value;
        const viText = document.getElementById('vi-sentence').innerText;
        if(!userInput) return alert("Hãy nhập câu trả lời!");

        document.querySelector('button').innerText = "Đang chấm điểm...";
        
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",AIzaSyB93st6BjiwfqczmlJYhBYqsXnhssB4y_A
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Chấm điểm câu dịch này. Việt: "${viText}". Anh: "${userInput}". Trả về JSON: {"score": số, "correct": "câu chuẩn", "comment": "nhận xét ngắn"}` }] }]
                })
            });
            const data = await response.json();
            const resText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
            const result = JSON.parse(resText);

            document.getElementById('result').style.display = 'block';
            document.getElementById('score').innerText = result.score + "/100";
            document.getElementById('correct-ans').innerText = result.correct;
            document.getElementById('feedback').innerText = result.comment;
        } catch (error) {
            alert("Lỗi kết nối AI. Hãy kiểm tra API Key!");
        }
        document.querySelector('button').innerText = "Chấm điểm với AI";
    }
</script>

</body>
</html>
