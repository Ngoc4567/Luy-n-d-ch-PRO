<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Luyện Dịch PRO</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .vietnamese-box { background: #eef6ff; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        textarea:focus { border-color: var(--primary); }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #result { display: none; margin-top: 25px; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 15px; }
        .score { font-size: 32px; font-weight: bold; color: #28a745; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span style="font-size: 24px;">🤖</span>
        <h2 style="margin: 0;">Luyện Dịch PRO</h2>
    </div>

    <div class="vietnamese-box">
        <strong>Câu tiếng Việt:</strong><br>
        <span id="vi-sentence">Tôi thích học lập trình vì nó giúp tôi sáng tạo hơn.</span>
    </div>
    
    <textarea id="en-input" placeholder="Nhập bản dịch tiếng Anh của bạn..."></textarea>
    <button id="check-btn" onclick="checkTranslation()">Chấm điểm với AI</button>

    <div id="result">
        <div class="score" id="score-val">0/100</div>
        <p><strong>Đáp án đúng:</strong> <br><i id="correct-ans" style="color: var(--primary);"></i></p>
        <p><strong>Nhận xét:</strong> <br><span id="ai-feedback"></span></p>
        <button onclick="location.reload()" style="background: #6c757d; font-size: 14px; padding: 10px;">Làm câu khác</button>
    </div>
</div>

<script>
    // QUAN TRỌNG: Thay dãy chữ dưới đây bằng API Key của bạn
    const MY_API_KEY = "DÁN_MÃ_API_CỦA_BẠN_VÀO_ĐÂY";

    async function checkTranslation() {
        const userInput = document.getElementById('en-input').value.trim();
        const viText = document.getElementById('vi-sentence').innerText;
        const btn = document.getElementById('check-btn');

        if (MY_API_KEY.includes("AIzaSyB93st6BjiwfqczmlJYhBYqsXnhssB4y_A")) {
            alert("LỖI: Bạn chưa dán API Key vào mã nguồn!");
            return;
        }

        if (!userInput) {
            alert("Vui lòng nhập câu dịch!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "AI đang chấm điểm...";

        const prompt = `Bạn là giáo viên bản ngữ. Chấm điểm bản dịch này.
        Tiếng Việt: "${viText}"
        Người dùng dịch: "${userInput}"
        Trả về duy nhất định dạng JSON: {"score": số, "correct": "câu tiếng Anh chuẩn", "comment": "nhận xét ngắn gọn"}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            let aiText = data.candidates[0].content.parts[0].text;
            
            // Xử lý lọc chuỗi JSON
            const jsonMatch = aiText.match(/\{.*\}/s);
            if (jsonMatch) {
                const result = JSON.parse(jsonMatch[0]);
                document.getElementById('result').style.display = 'block';
                document.getElementById('score-val').innerText = result.score + "/100";
                document.getElementById('correct-ans').innerText = result.correct;
                document.getElementById('ai-feedback').innerText = result.comment;
            } else {
                throw new Error("AI trả về định dạng không đúng");
            }

        } catch (error) {
            alert("Có lỗi xảy ra: " + error.message);
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Chấm điểm với AI";
        }
    }
</script>

</body>
</html>
