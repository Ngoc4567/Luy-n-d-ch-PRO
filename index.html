<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Luyện Dịch PRO</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .vietnamese-box { background: #eef6ff; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:disabled { background: #ccc; }
        #result { display: none; margin-top: 25px; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center;">🤖 Luyện Dịch PRO</h2>
    <div class="vietnamese-box">
        <strong>Câu tiếng Việt:</strong><br>
        <span id="vi-sentence">Tôi thích học lập trình vì nó giúp tôi sáng tạo hơn.</span>
    </div>
    
    <textarea id="en-input" placeholder="Nhập bản dịch tiếng Anh của bạn..."></textarea>
    <button id="check-btn" onclick="checkTranslation()">Chấm điểm với AI</button>

    <div id="result">
        <div id="score-val" style="font-size: 32px; font-weight: bold; color: #28a745; text-align: center;"></div>
        <p><strong>Đáp án đúng:</strong> <br><i id="correct-ans" style="color: var(--primary);"></i></p>
        <p><strong>Nhận xét:</strong> <br><span id="ai-feedback"></span></p>
        <button onclick="location.reload()" style="background: #6c757d; font-size: 14px;">Làm câu khác</button>
    </div>
</div>

<script>
    // QUAN TRỌNG: Dán mã API Key thật của bạn vào giữa dấu ""
    const MY_API_KEY = "AIzaSyBxW2Ud1_5MkA3CyLuKyJ1hykb3UVGZtVw";

    async function checkTranslation() {
        const userInput = document.getElementById('en-input').value.trim();
        const viText = document.getElementById('vi-sentence').innerText;
        const btn = document.getElementById('check-btn');

        if (!userInput) return alert("Vui lòng nhập nội dung dịch!");
        
        btn.disabled = true;
        btn.innerText = "Đang kết nối AI...";

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Chấm điểm câu dịch sau. Việt: "${viText}". Anh: "${userInput}". Trả về JSON: {"score": số, "correct": "câu chuẩn", "comment": "nhận xét ngắn"}` }] }]
                })
            });

            const data = await response.json();

            // KIỂM TRA LỖI PHẢN HỒI
            if (data.error) {
                throw new Error("Lỗi API: " + data.error.message);
            }

            if (!data.candidates || data.candidates.length === 0) {
                throw new Error("AI không trả về kết quả. Hãy kiểm tra lại API Key.");
            }

            const aiText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
            const result = JSON.parse(aiText);

            document.getElementById('result').style.display = 'block';
            document.getElementById('score-val').innerText = result.score + "/100";
            document.getElementById('correct-ans').innerText = result.correct;
            document.getElementById('ai-feedback').innerText = result.comment;

        } catch (error) {
            alert("Có lỗi xảy ra: " + error.message);
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Chấm điểm với AI";
        }
    }
</script>

</body>
</html>
